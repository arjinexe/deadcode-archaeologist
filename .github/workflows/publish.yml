name: Publish to PyPI

# Triggers:
#   - Manually via GitHub UI (workflow_dispatch) for test releases
#   - Automatically on every version tag push (v1.2.3)
#
# Required GitHub secrets:
#   PYPI_API_TOKEN  — token from https://pypi.org/manage/account/token/
#                     scope: "Entire account" for first upload, then project-scoped
#
# Trusted Publisher (recommended alternative to API tokens):
#   Configure at https://pypi.org/manage/project/deadcode-archaeologist/settings/publishing/
#   Set environment = "pypi", then remove the password: line below and use:
#     id-token: write   (in permissions) + trusted publisher in PyPI settings

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"   # e.g. v1.0.0, v1.2.3
  workflow_dispatch:
    inputs:
      target:
        description: "Publish target"
        required: true
        default: "testpypi"
        type: choice
        options:
          - testpypi
          - pypi

jobs:
  # ── 1. Run full test suite before publishing ──────────────────────────────
  test:
    name: Test before publish
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Configure git (needed for test fixtures)
        run: |
          git config --global user.email "ci@archaeologist.test"
          git config --global user.name "CI Bot"

      - name: Install with dev dependencies
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests/ -v --tb=short

  # ── 2. Build source distribution + wheel ─────────────────────────────────
  build:
    name: Build distribution
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install build tools
        run: pip install build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Check distribution metadata
        run: twine check dist/*

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  # ── 3a. Publish to TestPyPI (manual dispatch or test target) ─────────────
  publish-testpypi:
    name: Publish to TestPyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'workflow_dispatch' &&
      github.event.inputs.target == 'testpypi'
    environment:
      name: testpypi
      url: https://test.pypi.org/p/deadcode-archaeologist
    permissions:
      id-token: write   # required for Trusted Publisher; remove if using API token
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          # password: ${{ secrets.TEST_PYPI_API_TOKEN }}  # uncomment if not using Trusted Publisher

  # ── 3b. Publish to PyPI (version tag push or manual pypi target) ──────────
  publish-pypi:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.target == 'pypi')
    environment:
      name: pypi
      url: https://pypi.org/p/deadcode-archaeologist
    permissions:
      id-token: write   # required for Trusted Publisher; remove if using API token
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # password: ${{ secrets.PYPI_API_TOKEN }}  # uncomment if not using Trusted Publisher
